<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Health by Kiran Kumar</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="dashboard-body">

  <!-- Dashboard Header -->
  <header class="dashboard-header">
    <h1>Health by Kiran Kumar</h1>
    <div class="nav-dropdown">
      <button class="nav-toggle" onclick="toggleNav()">☰ Menu</button>
      <div class="dropdown-menu" id="navMenu">
        <a href="dashboard.html" class="active">🏠 Home</a>
        <a href="75hard.html">💪 75 Hard Challenge</a>
        <a href="index.html" onclick="logout()">🚪 Logout</a>
      </div>
    </div>
  </header>

  <!-- Welcome Section -->
  <div class="welcome-section">
    <div class="welcome-text">Good day,</div>
    <div class="welcome-name">Welcome, Kiran 👋</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">2,450</div>
        <div class="stat-label">Calories Burned</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">45m</div>
        <div class="stat-label">Workout Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streakDays">0</div>
        <div class="stat-label">Streak Days</div>
      </div>
    </div>
  </div>

  <!-- Dashboard Content -->
  <div class="dashboard-content">

    <p class="section-title">Quick Actions</p>
    <a href="75hard.html" style="text-decoration:none;">
      <div class="card" style="display:flex;align-items:center;gap:16px;padding:20px;cursor:pointer;border:1.5px solid #e8e8e8;">
        <div style="width:48px;height:48px;background:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;">💪</div>
        <div>
          <div style="font-weight:600;font-size:0.95rem;">75 Hard Challenge</div>
          <div style="font-size:0.8rem;color:#888;margin-top:2px;">Log today's tasks & habits</div>
        </div>
        <div style="margin-left:auto;color:#bbb;font-size:1.2rem;">›</div>
      </div>
    </a>

    <p class="section-title">Today's Date</p>
    <div class="card" style="border:1.5px solid #e8e8e8;">
      <div style="font-size:0.82rem;color:#888;margin-bottom:4px;">Current Date</div>
      <div style="font-size:1rem;font-weight:600;" id="dashDate"></div>
    </div>

    <p class="section-title">Motivational Quote</p>
    <div class="card" style="border:1.5px solid #e8e8e8;background:#000;color:#fff;">
      <div style="font-size:1.05rem;font-weight:500;line-height:1.5;" id="quoteText"></div>
      <div style="font-size:0.78rem;color:#888;margin-top:8px;" id="quoteAuthor"></div>
    </div>

  </div>

  <footer style="background:#000;color:rgba(255,255,255,0.35);">Built with discipline by Kiran Kumar</footer>

  <script src="script.js"></script>
</body>
</html>
